<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrapRoyaltiesPro • Conference QR Codes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style> * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:#0f172a; color:#e2e8f0; line-height:1.5; -webkit-font-smoothing:antialiased; }
  a { color:#2B6F4B; text-decoration:none; }
  .wrap { max-width:1100px; margin:0 auto; padding:32px 24px; }
  .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
  .brand { display:flex; align-items:center; gap:10px; }
  .brand-icon { background:#2B6F4B; color:#e2e8f0; width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:700; }
  .brand-text { font-weight:700; font-size:18px; }
  .internal-tag { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:#B45309; background:rgba(234,179,8,0.12); padding:4px 10px; border-radius:99px; }
  h1 { font-size:30px; font-weight:800; line-height:1.2; margin-bottom:6px; }
  .subtitle { color:#94a3b8; font-size:14px; margin-bottom:28px; max-width:680px; }
  .toolbar { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
  .btn { background:#2B6F4B; color:#e2e8f0; border:0; border-radius:8px; padding:10px 18px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; text-decoration:none; display:inline-block; }
  .btn:hover { background:#1F5538; }
  .btn.secondary { background:#0f172a; color:#e2e8f0; border:1px solid #CBD5E1; }
  .btn.secondary:hover { border-color:#2B6F4B; color:#2B6F4B; }

  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px; }
  .qr-card { background:#0f172a; border:1px solid #E2E8F0; border-radius:14px; padding:22px; text-align:center; box-shadow:0 1px 2px rgba(15,23,42,0.04); page-break-inside:avoid; }
  .qr-card.primary { background:linear-gradient(135deg,rgba(34,197,94,0.10) 0%,#0f172a 100%); border-color:#86EFAC; }
  .qr-card .emoji { font-size:28px; margin-bottom:8px; }
  .qr-card .t { font-weight:800; font-size:18px; margin-bottom:4px; }
  .qr-card .d { font-size:13px; color:#94a3b8; margin-bottom:16px; min-height:36px; }
  .qr-card img.qr { display:block; margin:0 auto 12px; width:220px; height:220px; border-radius:6px; background:#0f172a; border:1px solid #E2E8F0; }
  .qr-card.primary img.qr { width:260px; height:260px; }
  .qr-card .url { font-size:11px; color:#94A3B8; font-family:monospace; word-break:break-all; margin-bottom:10px; }
  .qr-card .actions { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; }
  .qr-card .actions a, .qr-card .actions button { background:#0f172a; border:1px solid #E2E8F0; border-radius:6px; padding:6px 12px; font-size:11px; font-weight:600; cursor:pointer; color:#94a3b8; font-family:inherit; text-decoration:none; display:inline-block; }
  .qr-card .actions a:hover, .qr-card .actions button:hover { border-color:#2B6F4B; color:#2B6F4B; }
  .qr-card.primary .emoji { font-size:34px; }

  @media print {
    body { background:#0f172a; }
    .header, .toolbar, .actions, .subtitle { display:none; }
    .wrap { max-width:none; padding:10px; }
    .grid { grid-template-columns:repeat(2,1fr); gap:12px; }
    .qr-card { border:2px solid #000; box-shadow:none; padding:18px; }
    .qr-card .url { color:#000; }
  }

/* dark-theme hard overrides (auto) */
html, body { background:#020617 !important; color:#cbd5e1 !important; }
.card, .panel, .section-card, .summary, .summary-card, .banner, .notice, .callout,
.stat, .stat-card, .tile, .tile-card, .kpi, .kpi-card, .metric, .metric-card,
.score-card, .box, .box-card, .entry, .entry-card, .item, .item-card,
.readiness, .readiness-banner, .submission-banner, .health-score, .health-card,
.packet, .packet-row, .risk-card, .risk-row, .fix-card, .fix-row,
.what-we-do, .what-we-dont, .signup-card, .form-card, .form-row,
.row-card, .row-item, .row-block, .field, .field-row,
table, thead, tbody, tr, td, th { background:#0f172a !important; background-image:none !important; color:#cbd5e1 !important; border-color:rgba(99,102,241,0.2) !important; }
thead, thead th { background:#0b1222 !important; color:#94a3b8 !important; }
body > *, main > * { color:#cbd5e1; }
h1, h2, h3, h4, h5, h6 { color:#f1f5f9 !important; }
strong, b { color:#f1f5f9 !important; }
hr { border-color: rgba(15,23,42,0.8) !important; }
</style> <link rel="stylesheet" href="/publisher-portal/css/theme.css"> </head>
<body>
<div class="wrap"> <div class="header"> <div class="brand"> <div class="brand-icon">R</div> <div class="brand-text">TrapRoyaltiesPro</div> </div> <span class="internal-tag">Internal · Conference Prep</span> </div> <h1>Conference QR Codes</h1> <div class="subtitle"> Print this page, save as PDF, or click "PNG" on any card to download that QR. Each QR points to a live page on
    traproyaltiespro.com.
  </div> <div class="toolbar"> <button class="btn" onclick="window.print()"> Print all</button> <a class="btn secondary" id="print-tip" style="cursor:help;" onclick="alert('Tip: use your browser&apos;s Print dialog and select &quot;Save as PDF&quot; as the destination.')"> How to save as PDF</a> </div> <div class="grid" id="qr-grid"></div>
</div> <script>
const QRS = [
  { key:'hub',       title:'Everything',          desc:'One scan → all demos, slide content, contact', url:'https:///publisher-portal/pages/demo-hub.html', primary:true },
  { key:'dry',       title:'Dry Cleaning Report', desc:'Sample catalog scan + fix-later checklist',    url:'https:///publisher-portal/pages/demo-dry-cleaning.html' },
  { key:'dashboard', title:'Health Dashboard',    desc:'Per-work readiness scores + CWR-ready count',  url:'https:///publisher-portal/pages/demo-health-dashboard.html' },
  { key:'cwr',       title:'CWR Pre-Flight',      desc:'Fatal, warnings, optional + alignment checks', url:'https:///publisher-portal/pages/demo-cwr-preflight.html' },
  { key:'pilot',     title:'Join the Pilot',       desc:'3–5 seats · signup form',                      url:'https:///publisher-portal/pages/demo-pilot-signup.html' },
  { key:'wizard',    title:'Live Wizard Demo',     desc:'The real Cleaning Wizard with mock catalog',   url:'https:///publisher-portal/pages/review.html?demo=1' },
  { key:'autorun',   title:'Auto-Run Wizard',       desc:'Wizard fast-forwards to the generated CWR packet', url:'https:///publisher-portal/pages/review.html?demo=1&auto=1' },
  { key:'cwrresult', title:'CWR Packet Result',    desc:'Static snapshot — Swedish 33.33%, validation summary', url:'https:///publisher-portal/pages/demo-cwr-result.html' },
  { key:'pubhealth', title:'Publisher Scorecard',  desc:'Catalog-level health · coverage · funnel · Q2 activity', url:'https:///publisher-portal/pages/demo-publisher-health.html' },
  { key:'email',     title:'Email Glenn',          desc:'Opens phone email app addressed to Ken',       url:'mailto:hello@traproyaltiespro.com?subject=TrapRoyaltiesPro%20-%20Stockholm%20Music%20Week' },
];

function qrImgUrl(targetUrl, size){
  return 'https://api.qrserver.com/v1/create-qr-code/?size=' + size + 'x' + size + '&margin=10&ecc=M&data=' + encodeURIComponent(targetUrl);
}
function slugify(s){ return s.replace(/[^a-z0-9]/gi,'-').toLowerCase(); }

function render(){
  const grid = document.getElementById('qr-grid');
  QRS.forEach(q => {
    const size = q.primary ? 520 : 440;
    const imgUrl = qrImgUrl(q.url, size);
    const slug = slugify(q.title);
    const cls = q.primary ? 'qr-card primary' : 'qr-card';
    const card = document.createElement('div');
    card.className = cls;
    card.innerHTML =
      '<div class="emoji">' + q.emoji + '</div>' +
      '<div class="t">' + q.title + '</div>' +
      '<div class="d">' + q.desc + '</div>' +
      '<img class="qr" src="' + imgUrl + '" alt="QR for ' + q.title + '" loading="eager">' +
      '<div class="url">' + q.url + '</div>' +
      '<div class="actions">' +
        '<a href="' + imgUrl + '" download="trp-qr-' + slug + '.png" target="_blank">⬇ PNG</a>' +
        '<button data-url="' + q.url.replace(/"/g,'&quot;') + '">⧉ Copy URL</button>' +
      '</div>';
    grid.appendChild(card);
  });
  // Wire copy buttons (avoids inline-JS escaping issues with special chars in URLs)
  document.querySelectorAll('.qr-card .actions button[data-url]').forEach(btn => {
    btn.addEventListener('click', () => {
      const u = btn.getAttribute('data-url');
      navigator.clipboard.writeText(u).then(() => {
        const prev = btn.textContent;
        btn.textContent = ' Copied';
        setTimeout(() => { btn.textContent = prev; }, 1200);
      }).catch(() => {
        prompt('Copy the URL:', u);
      });
    });
  });
}
render();
</script>
</body>
</html>
