<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4. Split Verification - Roya</title>
    <style>

        * { box-sizing: border-box; }
        body { margin: 0; font-family: Inter, Arial, sans-serif; background: #0b1226; color: #e8edff; padding: 24px; }
        .container { max-width: 660px; margin: 0 auto; }
        .page-container { background: #111a36; border: 1px solid #253764; border-radius: 14px; padding: 28px; }
        .back-link { color: #f0b429; text-decoration: none; font-size: 14px; display: inline-block; margin-bottom: 18px; }
        h1 { margin: 0 0 8px; font-size: 22px; }
        .desc { color: #a8b5d9; margin-bottom: 20px; font-size: 14px; }
        .upload-area { border: 1.5px dashed #2c4073; border-radius: 10px; padding: 16px; text-align: center; margin-bottom: 8px; cursor: pointer; transition: border-color 0.2s; }
        .upload-area:hover { border-color: #5e6dff; }
        .upload-area input[type="file"] { display: none; }
        .upload-label { color: #7b8fc4; font-size: 14px; }
        .file-name { color: #f0b429; font-size: 13px; margin-top: 5px; }
        .sample-note { font-size: 12px; color: #5a6a9a; text-align: center; margin-bottom: 10px; }
        .preview { display:none; background:#0d1630; border:1px solid #1e2d52; border-radius:8px; padding:8px 12px; margin-bottom:10px; }
        button { background: linear-gradient(90deg,#5e6dff,#7c65ff); border: 0; color: white; padding: 11px 14px; border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; font-size: 15px; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .results { margin-top: 20px; display: none; }
        .loading { text-align: center; color: #7b8fc4; padding: 24px; font-size: 14px; }
        .error-msg { color: #f87171; background: rgba(239,68,68,0.1); border-radius: 8px; padding: 12px; font-size: 14px; margin-top: 12px; }
        .section-title { font-size: 13px; font-weight: 600; color: #7b8fc4; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; margin-top: 16px; }


        .status-banner { border-radius:10px; padding:14px 18px; margin-bottom:14px; font-weight:700; font-size:15px; }
        .status-ok   { background:rgba(34,197,94,.12); border:1px solid rgba(34,197,94,.3); color:#22c55e; }
        .status-fail { background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.3); color:#f87171; }
        .totals-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:14px; }
        .total-card { background:#0f1834; border-radius:10px; padding:14px; text-align:center; }
        .total-num { font-size:22px; font-weight:800; color:#e8edff; }
        .danger { color:#f87171; }
        .detail-table { width:100%; border-collapse:collapse; font-size:13px; }
        .detail-table th { text-align:left; color:#5a6a9a; font-weight:600; padding:6px 10px; border-bottom:1px solid #1e2d52; }
        .detail-table td { padding:8px 10px; border-bottom:1px solid #151f3a; color:#c8d3f0; }
        .detail-table tr:last-child td { border-bottom:none; }
        .diff-ok { color:#22c55e; font-weight:700; } .diff-bad { color:#f87171; font-weight:700; }
    
    </style>
    <link rel="stylesheet" href="/publisher-portal/css/theme.css">
  </head>
<body>
<div class="container">
    <div class="page-container">
        <a href="/" class="back-link">Home</a>
        <h1>4. Split Verification</h1>
        <p class="desc">Verifies all rights shares add to 100%. CSV needs title, role, and share_percent (or similar) columns.</p>

        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <input type="file" id="fileInput" accept=".csv,.json,.txt" onchange="onFileChange(this)">
            <div class="upload-label">&#128194; Click to upload CSV or JSON (comma, semicolon, or tab)</div>
            <div class="file-name" id="fileName"></div>
        </div>
        <div class="preview" id="preview"></div>
        <div class="sample-note">No file needed &#8212; click Run to try with built-in sample data</div>

        <button id="runBtn" onclick="runTool()">Verify Splits</button>
        <div class="results" id="results"></div>
        <div class="error-msg" id="errorMsg" style="display:none"></div>
    </div>
</div>
<script>
    var SAMPLE = [{"title": "Midnight Sun", "role": "composer", "share_percent": 35}, {"title": "Midnight Sun", "role": "lyricist", "share_percent": 35}, {"title": "Midnight Sun", "role": "publisher", "share_percent": 20}, {"title": "Vinterljus", "role": "composer", "share_percent": 50}, {"title": "Vinterljus", "role": "publisher", "share_percent": 50}, {"title": "Aurora", "role": "composer", "share_percent": 60}, {"title": "Aurora", "role": "lyricist", "share_percent": 20}, {"title": "Aurora", "role": "publisher", "share_percent": 25}, {"title": "Nordlys", "role": "composer", "share_percent": 100}];

    const COL_MAP = {
        title:         ['title','work_title','work title','song title','track','track name','song','work','titel','lattitel'],
        isrc:          ['isrc','isrc_code','isrc code','isrc-code'],
        ipi:           ['ipi','ipi_number','ipi number','writer_ipi','writer ipi','ipi-nr','ipi nr'],
        iswc:          ['iswc','iswc_code','iswc code','iswc-code'],
        publisher:     ['publisher','publisher_name','publisher name','label','forlag','utgivare'],
        role:          ['role','writer_role','contributor_role','writer role','roll','funktion'],
        share_percent: ['share_percent','share percent','share%','split_percent','split percent','split%',
                        'writer_share','writer share','percentage','procent','andel','shares','share']
    };
    function normaliseHeaders(headers) {
        return headers.map(function(h) {
            var lower = h.toLowerCase().trim();
            for (var std in COL_MAP) {
                if (COL_MAP[std].indexOf(lower) !== -1) return std;
            }
            return lower;
        });
    }
    function parseFile(text) {
        text = text.replace(/^\uFEFF/, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
        var lines = text.split('\n').filter(function(l){ return l.trim(); });
        if (lines.length < 2) return { rows: [], headers: [], raw_headers: [], delim: ',' };
        var first = lines[0];
        var semis  = (first.match(/;/g)  || []).length;
        var commas = (first.match(/,/g)  || []).length;
        var tabs   = (first.match(/\t/g) || []).length;
        var delim  = (tabs > semis && tabs > commas) ? '\t' : (semis > commas ? ';' : ',');
        var raw_headers = first.split(delim).map(function(h){ return h.trim().replace(/^"|"$/g,''); });
        var headers = normaliseHeaders(raw_headers);
        var rows = lines.slice(1).map(function(line) {
            var vals = line.split(delim).map(function(v){ return v.trim().replace(/^"|"$/g,''); });
            return headers.reduce(function(obj,h,i){ obj[h] = vals[i] || ''; return obj; }, {});
        });
        return { rows: rows, headers: headers, raw_headers: raw_headers, delim: delim };
    }
    function onFileChange(input) {
        document.getElementById('fileName').textContent = input.files[0] ? input.files[0].name : '';
    }
    function showPreview(result, filename) {
        var prev = document.getElementById('preview');
        if (!prev) return;
        var mapped   = result.headers.filter(function(h){ return COL_MAP.hasOwnProperty(h); });
        var unmapped = result.raw_headers.filter(function(_,i){ return !COL_MAP.hasOwnProperty(result.headers[i]); });
        prev.style.display = 'block';
        prev.innerHTML =
            '<div style="font-size:12px;color:#7b8fc4;margin-bottom:3px">' + filename +
            ' &mdash; ' + result.rows.length + ' rows, delimiter: "' + (result.delim === '\t' ? 'TAB' : result.delim) + '"</div>' +
            '<div style="font-size:12px;color:#22c55e">&#10003; Mapped columns: ' + (mapped.join(', ') || 'none') + '</div>' +
            (unmapped.length ? '<div style="font-size:12px;color:#fbbf24">&#9888; Unmapped: ' + unmapped.join(', ') + '</div>' : '');
    }
    async function getPayload(sampleData) {
        var file = document.getElementById('fileInput').files[0];
        if (!file) return { rows: sampleData };
        var text = await file.text();
        if (file.name.toLowerCase().endsWith('.json')) {
            var parsed = JSON.parse(text);
            var rows = Array.isArray(parsed) ? parsed : (parsed.rows || []);
            showPreview({ rows: rows, raw_headers: Object.keys(rows[0]||{}), headers: Object.keys(rows[0]||{}), delim: 'json' }, file.name);
            return { rows: rows };
        }
        var result = parseFile(text);
        showPreview(result, file.name);
        return { rows: result.rows };
    }

    async function runTool() {
        var btn = document.getElementById('runBtn');
        var resultsDiv = document.getElementById('results');
        var errorDiv = document.getElementById('errorMsg');
        btn.disabled = true;
        errorDiv.style.display = 'none';
        resultsDiv.style.display = 'block';
        var _anim = animateLoading(resultsDiv, ['Reading split data…','Validating shares…','Checking totals…','Verifying ownership…']);
        try {
            var payload = await getPayload(SAMPLE);
            var response = await fetch('/api/splits', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            var data = await response.json();
            _anim.stop(); renderResults(data);
        } catch(e) {
            _anim.stop(); resultsDiv.style.display = 'none';
            errorDiv.style.display = 'block';
            errorDiv.textContent = 'Error: ' + e.message;
        } finally {
            btn.disabled = false;
        }
    }

    function animateLoading(div, msgs) {
        var i=0; div.style.display='block'; div.innerHTML='<div class="loading">'+msgs[0]+'</div>';
        var t=setInterval(function(){ i=(i+1)%msgs.length; div.innerHTML='<div class="loading">'+msgs[i]+'</div>'; },700);
        return { stop: function(){ clearInterval(t); } };
    }

    function renderResults(data) {
        var verified = data.verified;
        var details = data.details || [];
        var rowsHtml = details.map(function(d) {
            var diff = d.difference != null ? d.difference : 0;
            var ok = Math.abs(diff) < 0.01;
            return '<tr><td>' + d.track + '</td><td>' + (d.composer!=null?d.composer:'-') + '%</td><td>' + (d.lyricist!=null?d.lyricist:'-') + '%</td><td>' + (d.publisher!=null?d.publisher:'-') + '%</td><td class="' + (ok?'diff-ok':'diff-bad') + '">' + (ok ? '&#10003; 100%' : d.actual + '% (' + Math.abs(diff).toFixed(1) + '% off)') + '</td></tr>';
        }).join('');
        document.getElementById('results').innerHTML =
            '<div class="status-banner ' + (verified?'status-ok':'status-fail') + '">' + (verified?'&#10003; All splits verified':'&#10007; Split discrepancies detected') + '</div>' +
            '<div class="totals-grid"><div class="total-card"><div class="total-num">' + (data.total_expected||0) + '</div><div style="font-size:11px;color:#7b8fc4;margin-top:4px">Expected %</div></div><div class="total-card"><div class="total-num">' + (data.total_actual||0) + '</div><div style="font-size:11px;color:#7b8fc4;margin-top:4px">Actual %</div></div><div class="total-card"><div class="total-num ' + (Math.abs(data.discrepancy||0)>0.01?'danger':'') + '">' + (data.discrepancy||0) + '</div><div style="font-size:11px;color:#7b8fc4;margin-top:4px">Discrepancy</div></div></div>' +
            (details.length ? '<div class="section-title">Per-work breakdown</div><table class="detail-table"><thead><tr><th>Work</th><th>Composer</th><th>Lyricist</th><th>Publisher</th><th>Total</th></tr></thead><tbody>' + rowsHtml + '</tbody></table>' : '');
    }
    
</script>
</body>
</html>
