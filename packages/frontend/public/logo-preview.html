<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Inter,sans-serif}
.row{display:flex;align-items:flex-start;gap:80px;padding:64px 80px}
.dark{background:#000}.light{background:#fff;border-top:1px solid #e5e5e5}
.label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;font-weight:600;margin-bottom:24px}
.dark .label{color:#444}.light .label{color:#bbb}
.col{display:flex;flex-direction:column;gap:0}
</style></head><body>
<div class="row dark">
  <div><div class="label">Symbol — White</div>
    <img src="logo-symbol-white.svg" width="240" height="240">
  </div>
  <div><div class="label">Lockup — White on Black</div>
    <div class="col">
      <img src="traproyaltiespro-logo-white.svg" width="320" height="48" style="display:block;margin-bottom:32px">
      <img src="traproyaltiespro-logo-white.svg" width="220" height="33" style="display:block;margin-bottom:24px">
      <img src="traproyaltiespro-logo-white.svg" width="140" height="21" style="display:block">
    </div>
  </div>
</div>
<div class="row light">
  <div><div class="label">Symbol — Dark</div>
    <img src="logo-symbol-dark.svg" width="240" height="240">
  </div>
  <div><div class="label">Lockup — Dark on White</div>
    <div class="col">
      <img src="traproyaltiespro-logo-dark.svg" width="320" height="48" style="display:block;margin-bottom:32px">
      <img src="traproyaltiespro-logo-dark.svg" width="220" height="33" style="display:block;margin-bottom:24px">
      <img src="traproyaltiespro-logo-dark.svg" width="140" height="21" style="display:block">
    </div>
  </div>
</div>
</body></html>
